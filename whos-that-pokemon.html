<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whos That Pokemon</title>
    <script src="./whos-that-pokemon.js" defer></script>
    <script
      src="https://kit.fontawesome.com/7ade9dc5a4.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <a class="header__title" href="./index.html"> POKEMIA </a>
      <nav>
        <a href="./pokedex.html">Pokedex</a>
        <a href="#">PokeCenter</a>
        <a href="#">Moves</a>
        <a href="#">PokeQuiz</a>
        <a href="#">PokeMart</a>
        <a href="#">Daycare</a>
        <a href="#">Generations</a>
        <a href="#">Variants</a>
      </nav>
    </header>
    <main class="container">
      <div class="wtp">
        <h1 class="wtp__title">WHO'S THAT<br /><span>POKEMON??</span></h1>
        <div class="wtp__right">
          <div class="wtp__select-wrapper">
            <p>Select a Generation</p>
            <label for="gen-selector"></label>
            <select
              name="generations"
              id="gen-selector"
              class="wtp__dropdown btn-primary"
            >
              <!-- <option value="gen-all">Select a generation!</option> -->
              <option value="gen-all">All Generations</option>
              <option value="gen-one">One (KANTO)</option>
              <option value="gen-two">Two (JHOTO)</option>
              <option value="gen-three">Three (HOENN)</option>
              <option value="gen-four">Four (SINNOH)</option>
              <option value="gen-five">Five (UNOVA)</option>
              <option value="gen-six">Six (KALOS)</option>
              <option value="gen-seven">Seven (ALOLA)</option>
              <option value="gen-eight">Eight (GALAR)</option>
              <option value="gen-nine">Nine (PALDEA)</option>
            </select>
          </div>
          <button
            class="btn-primary wtp__play-btn wtp__btn-padding"
            id="play-button"
          >
            Play
          </button>
        </div>
      </div>
      <div class="greatball__svg--wrapper">
        <!-- img # link to greatballsvg -->
        <img src="./assets/greatball-blue.svg" class="greatball--bg" />
        <img
          class="greatball--svg black-overlay"
          id="pokemon-svg"
          src=""
          alt=""
        />
      </div>
      <p class="correct-pokemon hidden" id="correct-pokemon">testing</p>
      <div class="greatball__input-box">
        <div class="greatball__input-wrap">
          <input
            list="pokemon-list"
            id="pokemon-choice"
            name="pokemon-name"
            class="btn-primary"
          />
          <datalist id="pokemon-list"> </datalist>

          <button
            class="btn-primary btn-submit wtp__btn-padding"
            id="greatball-submit-btn"
          >
            Submit
          </button>
        </div>
        <button
          class="wtp__skip-btn btn-primary wtp__btn-padding"
          id="wtp__skip-btn"
        >
          Skip
        </button>
      </div>
      <div class="greatball__bottom-bar">
        <div class="btn-primary wtp__btn-padding" id="btn-score">
          <p>Score</p>
          <p id="player-score">#</p>
        </div>
        <div class="btn-primary wtp__button-padding" id="btn-cry">
          <p>Hear it's Cry</p>
        </div>
        <button
          class="btn-type btn-primary wtp__btn-padding"
          id="type-hint-btn"
        >
          Pokemon Type
        </button>
      </div>
    </main>
    <footer class="pokeball-footer"><p>Design by Kayle</p></footer>
  </body>
</html>
