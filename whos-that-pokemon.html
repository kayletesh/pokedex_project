<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whos That Pokemon</title>
    <script src="./script.js" defer></script>
    <script src="./whos-that-pokemon.js" defer></script>
    <script
      src="https://kit.fontawesome.com/7ade9dc5a4.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
       <header class="header">
      <div class="header__branding">
        <img src="./assets/pokeball-outline.png" width="30px" />
        <a class="header__title" href="./index.html">PokéMia</a>
      </div>
      <button class="header__menu-button">
        <i class="fa-solid fa-bars fa-2xl"></i>
      </button>
      <nav class="header__nav">
        <ul class="header__nav-list">
          <li class="header__nav-item">
            <a class="header__nav-link header__nav-link--active" href="./whos-that-pokemon.html"
              >Who's That Pokémon?</a
            >
          </li>
          <li class="header__nav-item">
            <a class="header__nav-link " href="./team-generator.html"
              >Team Generator</a
            >
          </li>
          <li class="header__nav-item">
            <a class="header__nav-link " href="./pokedex.html">RotoDex</a>
          </li>
          <li class="header__nav-item">
            <a class="header__nav-link" href="./pokemon-quiz.html"
              >Pokémon Quiz</a
            >
          </li>
        </ul>
      </nav>
    <main class="container">
      <div class="wtp">
        <h1 class="wtp__title">WHO'S THAT <span>POKEMON??</span></h1>
        <div class="wtp__top-wrapper">
          <div class="wtp__left">
            <div class="wtp__select-wrapper">
              <p>Select a Generation</p>
              <label for="gen-selector"></label>
              <select name="generations" id="gen-selector" class="wtp__select">
                <!-- <option value="gen-all">Select a generation!</option> -->
                <option value="gen-all">All Generations</option>
                <option value="gen-one">One (KANTO)</option>
                <option value="gen-two">Two (JHOTO)</option>
                <option value="gen-three">Three (HOENN)</option>
                <option value="gen-four">Four (SINNOH)</option>
                <option value="gen-five">Five (UNOVA)</option>
                <option value="gen-six">Six (KALOS)</option>
                <option value="gen-seven">Seven (ALOLA)</option>
                <option value="gen-eight">Eight (GALAR)</option>
                <option value="gen-nine">Nine (PALDEA)</option>
              </select>
            </div>
            <button
              class="btn-primary wtp__play-btn wtp__btn-padding"
              id="play-button"
            >
              Play
            </button>
          </div>

          <div class="score-wrapper">
            <div class="score-card" id="btn-score">
              <p class="score-label">Score</p>
              <p class="score" id="player-score">0</p>
            </div>
            <div class="score-card high-score-card" id="btn-score">
              <p class="score-label">High Score</p>
              <p class="score" id="player-high-score">0</p>
            </div>
          </div>
        </div>
      </div>
      <div class="greatball__svg--wrapper">
        <!-- img # link to greatballsvg -->
        <img src="./assets/greatball-blue.svg" class="greatball__bg" />
        <img
          class="greatball__svg black-overlay hidden"
          id="pokemon-svg"
          src=""
          alt=""
        />
      </div>
      <p class="sub-heading height-20" id="correct-pokemon"></p>
      <div class="input-box__wrapper">
        <form onsubmit="submitForm(event)">
          <input
            list="pokemon-list"
            id="pokemon-choice"
            name="pokemon-name"
            class="input-box__input"
            placeholder="Enter Guess Here!"
          />
          <datalist id="pokemon-list"> </datalist>
          <button
            type="submit"
            value="pokemon-list"
            class="btn-primary submit-btn wtp__btn-padding"
            id="greatball-submit-btn"
          >
            Submit
          </button>
        </form>
        <button
          class="skip-btn btn-primary wtp__btn-padding"
          id="wtp__skip-btn"
        >
          Skip
        </button>
      </div>
      <div class="bottom-bar__wrapper">
        <button class="hint-btn__cry btn-primary" id="btn-cry">Cry</button>
        <button class="hint-btn__type btn-primary" id="type-hint-btn">
          Type
        </button>
      </div>
    </main>
    <footer class="pokeball-footer"><p>Design by Kayle</p></footer>
  </body>
</html>
