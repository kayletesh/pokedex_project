<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whos That Pokemon</title>
    <script src="./whos-that-pokemon.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="wtp-body">
    <main class="wtp">
      <h1>Hello world</h1>
      <div class="dropdown-container">
        <label for="gen-selector">Select A Generation!</label>
        <select name="generations" id="gen-selector">
          <option value="">Select a generation</option>
          <option value="gen-all">ALL</option>
          <option value="gen-one">ONE (KANTO)</option>
          <option value="gen-two">TWO (JHOTO)</option>
          <option value="gen-three">THREE (HOENN)</option>
          <option value="gen-four">FOUR (SINNOH)</option>
          <option value="gen-five">FIVE (UNOVA)</option>
          <option value="gen-six">SIX (KALOS)</option>
          <option value="gen-seven">SEVEN (ALOLA)</option>
          <option value="gen-eight">EIGHT (GALAR)</option>
          <option value="gen-nine">NINE (PALDEA)</option>
        </select>
      </div>
      <div id="pokemon-svg"><img class="pokemon-svg" src="" alt="" /></div>
      <button class="play-button" id="play-button">PLAY</button>
    </main>
  </body>
</html>
