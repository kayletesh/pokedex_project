<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whos That Pokemon</title>
    <script src="./whos-that-pokemon.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <a href="./index.html">
        <img src="./assets/pokemia-logo.png" alt="Pokemia logo" />
      </a>
      <nav>
        <a href="./pokedex.html">Pokedex</a>
        <a href="#">PokeCenter</a>
        <a href="#">Moves</a>
        <a href="#">PokeQuiz</a>
        <a href="#">PokeMart</a>
        <a href="#">Daycare Center</a>
        <a href="#">Generations</a>
        <a href="#">Variants</a>
      </nav>
    </header>
    <main class="container">
      <div class="wtp">
        <h1 class="wtp__title">WHO'S THAT POKEMON</h1>
        <div class="wtp__right">
          <label for="gen-selector"></label>
          <select name="generations" id="gen-selector" class="wtp__dropdown">
            <option value="gen-all">ALL GENERATIONS</option>
            <option value="gen-one">ONE (KANTO)</option>
            <option value="gen-two">TWO (JHOTO)</option>
            <option value="gen-three">THREE (HOENN)</option>
            <option value="gen-four">FOUR (SINNOH)</option>
            <option value="gen-five">FIVE (UNOVA)</option>
            <option value="gen-six">SIX (KALOS)</option>
            <option value="gen-seven">SEVEN (ALOLA)</option>
            <option value="gen-eight">EIGHT (GALAR)</option>
            <option value="gen-nine">NINE (PALDEA)</option>
          </select>
          <button class="btn-primary wtp__play-btn" id="play-button">
            PLAY
          </button>
        </div>
      </div>
      <div class="pokeball greatball">
        <!-- img # link to greatballsvg -->
        <img src="#" class="greatball--bg" />
        <img class="greatball--svg" id="pokemon-svg" src="" alt="" />
      </div>
      <div class="greatball__input-box">
        <input
          type="text"
          id="greatball-user-input"
          name="pokemon-name"
          class="greatball__input-box--input"
          id="greatball-input"
        />
        <button class="btn-primary, btn-submit" id="greatball-submit-btn">
          SUBMIT
        </button>
        <button class="wtp__skip-btn" id="wtp__skip-btn">SKIP</button>
      </div>
      <div class="greatball__bottom-bar">
        <div>
          <p>SCORE</p>
          <p>#</p>
        </div>
        <div>
          <p>STREAK</p>
          <p>#</p>
        </div>
        <button class="btn-hint" id="greatball-btn-hint">need a hint?</button>
      </div>
    </main>
    <footer class="pokeball-footer"><p>Design by Kayle</p></footer>
  </body>
</html>
